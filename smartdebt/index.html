<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SmartDebt — Destiny Tracer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="home">
    <header class="home-header">
      <h1>💳💰 SmartDebt</h1>
      <p>Track your debts, savings, income & expenses — get strategies to reduce EMI and double savings!</p>
    </header>

    <section class="apps-grid">
      <!-- Income Section -->
      <article class="app-card">
        <h3 class="app-title">Income 💵</h3>
        <div class="grid">
          <input type="number" placeholder="Primary Income" id="primaryIncome">
          <input type="number" placeholder="Additional Income" id="additionalIncome">
          <input type="number" placeholder="Rental Income" id="rentalIncome">
          <input type="number" placeholder="Misc Income" id="miscIncome">
        </div>
      </article>

      <!-- Expenses Section -->
      <article class="app-card">
        <h3 class="app-title">Expenses 💸</h3>
        <div class="grid">
          <input type="number" placeholder="Monthly Expenses" id="expenses">
          <input type="number" placeholder="EMI Payments" id="emiPayments">
          <input type="number" placeholder="Other Obligations" id="otherObligations">
        </div>
      </article>

      <!-- Debts Section -->
      <article class="app-card">
        <h3 class="app-title">Debts 🏦</h3>
        <div class="grid">
          <input type="text" placeholder="Account Name" id="debtName">
          <select id="debtType">
            <option>Credit Card</option>
            <option>App Loan</option>
            <option>Personal Loan</option>
            <option>Housing Loan</option>
            <option>Motor Loan</option>
            <option>Insurance Loan</option>
            <option>Gold Loan</option>
            <option>Chit (Private)</option>
          </select>
          <input type="number" placeholder="Sanction Amount" id="debtAmount">
          <input type="number" placeholder="Interest Rate %" id="debtInterest">
          <input type="number" placeholder="Tenure (months)" id="debtTenure">
          <input type="number" placeholder="Paid EMIs" id="debtPaid">
        </div>
        <button onclick="addDebt()">➕ Add Debt</button>
      </article>

      <!-- Savings Section -->
      <article class="app-card">
        <h3 class="app-title">Savings 💎</h3>
        <div class="grid">
          <input type="text" placeholder="Account Name" id="savingName">
          <select id="savingType">
            <option>Fixed Deposit</option>
            <option>Insurance</option>
            <option>Mutual Funds</option>
            <option>Gold</option>
            <option>Chit</option>
            <option>Private Chit</option>
          </select>
          <input type="number" placeholder="Amount Saved" id="savingAmount">
        </div>
        <button onclick="addSaving()">➕ Add Saving</button>
      </article>

      <!-- Summary Section -->
      <article class="app-card">
        <h3 class="app-title">Summary 📊</h3>
        <div id="summary"></div>
        <canvas id="statusChart"></canvas>
        <button onclick="resetAll()">🗑 Reset All Data</button>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>

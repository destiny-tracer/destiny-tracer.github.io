<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Subnet Calculator | destiny-tracer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #667eea;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.95em;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .calculate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .result-box {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            text-align: center;
        }

        .result-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 1.3em;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }

        .detail-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .detail-section h3 {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: #667eea;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #666;
            font-weight: 600;
        }

        .detail-value {
            font-weight: 700;
            color: #333;
            font-family: 'Courier New', monospace;
        }

        .binary-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            overflow-x: auto;
        }

        .binary-label {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .binary-value {
            color: #333;
            font-size: 0.95em;
            word-break: break-all;
        }

        .info-box {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-top: 20px;
            border-radius: 6px;
        }

        .info-box h4 {
            color: #667eea;
            margin-bottom: 8px;
        }

        .info-box ul {
            margin-left: 20px;
            color: #555;
            line-height: 1.8;
        }

        .cidr-table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
        }

        .cidr-table th,
        .cidr-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .cidr-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }

        .cidr-table td {
            font-family: 'Courier New', monospace;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .result-value {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../../index.html" class="back-link">← Back to Home</a>
        
        <header>
            <h1>🌐 IP Subnet Calculator</h1>
            <p>Calculate IP address ranges, subnet masks & network details (IPv4 & IPv6)</p>
        </header>

        <div class="card">
            <div style="display: flex; gap: 15px; margin-bottom: 20px; justify-content: center;">
                <button onclick="switchIPVersion('ipv4')" id="ipv4Btn" class="calculate-btn" style="flex: 1; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">IPv4</button>
                <button onclick="switchIPVersion('ipv6')" id="ipv6Btn" class="calculate-btn" style="flex: 1; background: #e0e0e0; color: #666;">IPv6</button>
            </div>
        </div>

        <div class="card" id="ipv4Card">
            <h2>IPv4 Address & Subnet</h2>
            
            <div class="form-grid">
                <div class="form-group">
                    <label>IP Address</label>
                    <input type="text" id="ipAddress" placeholder="e.g., 192.168.1.0" value="192.168.1.0">
                </div>

                <div class="form-group">
                    <label>CIDR / Subnet Bits</label>
                    <select id="cidrBits">
                        ${generateCIDROptions()}
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Or Enter Subnet Mask Directly</label>
                <input type="text" id="subnetMask" placeholder="e.g., 255.255.255.0" readonly>
            </div>

            <button class="calculate-btn" onclick="calculateSubnet()">Calculate Subnet</button>
        </div>

        <div class="card" id="ipv6Card" style="display: none;">
            <h2>IPv6 Address & Prefix</h2>
            
            <div class="form-group">
                <label>IPv6 Address</label>
                <input type="text" id="ipv6Address" placeholder="e.g., 2001:0db8:85a3:0000:0000:8a2e:0370:7334" value="2001:0db8:85a3::8a2e:0370:7334">
            </div>

            <div class="form-group">
                <label>IPv6 Prefix Length</label>
                <select id="ipv6Prefix">
                    ${generateIPv6PrefixOptions()}
                </select>
            </div>

            <button class="calculate-btn" onclick="calculateIPv6Subnet()">Calculate IPv6 Subnet</button>
        </div>

        <div class="results" id="results">
            <div class="result-grid" id="resultGrid">
                <!-- IPv4 results -->
            </div>

            <div class="detail-section" id="detailSection">
                <!-- IPv4/IPv6 details -->
            </div>

            <div class="detail-section" id="binarySection">
                <!-- Binary representation for IPv4 -->
            </div>

            <div class="info-box" id="infoBox">
                <!-- Reference tables -->
            </div>
        </div>
    </div>

    <script>
        let currentIPVersion = 'ipv4';

        function switchIPVersion(version) {
            currentIPVersion = version;
            
            if (version === 'ipv4') {
                document.getElementById('ipv4Card').style.display = 'block';
                document.getElementById('ipv6Card').style.display = 'none';
                document.getElementById('ipv4Btn').style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                document.getElementById('ipv4Btn').style.color = 'white';
                document.getElementById('ipv6Btn').style.background = '#e0e0e0';
                document.getElementById('ipv6Btn').style.color = '#666';
            } else {
                document.getElementById('ipv4Card').style.display = 'none';
                document.getElementById('ipv6Card').style.display = 'block';
                document.getElementById('ipv6Btn').style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                document.getElementById('ipv6Btn').style.color = 'white';
                document.getElementById('ipv4Btn').style.background = '#e0e0e0';
                document.getElementById('ipv4Btn').style.color = '#666';
            }
            
            // Hide results when switching
            document.getElementById('results').classList.remove('active');
        }

        function generateCIDROptions() {
            let options = '';
            for (let i = 8; i <= 32; i++) {
                options += `<option value="${i}"${i === 24 ? ' selected' : ''}>/\${i}</option>`;
            }
            return options;
        }

        function generateIPv6PrefixOptions() {
            let options = '';
            const common = [32, 48, 56, 64, 80, 96, 112, 128];
            for (let i = 1; i <= 128; i++) {
                const selected = i === 64 ? ' selected' : '';
                options += `<option value="${i}"${selected}>/\${i}</option>`;
            }
            return options;
        }

        // Update subnet mask when CIDR changes
        document.getElementById('cidrBits').addEventListener('change', function() {
            const cidr = parseInt(this.value);
            const mask = cidrToSubnetMask(cidr);
            document.getElementById('subnetMask').value = mask;
        });

        // Initialize subnet mask
        document.getElementById('subnetMask').value = cidrToSubnetMask(24);

        function cidrToSubnetMask(cidr) {
            const mask = [];
            for (let i = 0; i < 4; i++) {
                const n = Math.min(cidr, 8);
                mask.push(256 - Math.pow(2, 8 - n));
                cidr -= n;
            }
            return mask.join('.');
        }

        function ipToLong(ip) {
            const parts = ip.split('.');
            return (parseInt(parts[0]) << 24) + (parseInt(parts[1]) << 16) + 
                   (parseInt(parts[2]) << 8) + parseInt(parts[3]);
        }

        function longToIp(long) {
            return [
                (long >>> 24) & 0xFF,
                (long >>> 16) & 0xFF,
                (long >>> 8) & 0xFF,
                long & 0xFF
            ].join('.');
        }

        function ipToBinary(ip) {
            return ip.split('.').map(octet => 
                parseInt(octet).toString(2).padStart(8, '0')
            ).join('.');
        }

        function getIPClass(firstOctet) {
            if (firstOctet >= 1 && firstOctet <= 126) return 'Class A';
            if (firstOctet >= 128 && firstOctet <= 191) return 'Class B';
            if (firstOctet >= 192 && firstOctet <= 223) return 'Class C';
            if (firstOctet >= 224 && firstOctet <= 239) return 'Class D (Multicast)';
            if (firstOctet >= 240 && firstOctet <= 255) return 'Class E (Reserved)';
            return 'Invalid';
        }

        function isPrivateIP(ip) {
            const parts = ip.split('.').map(Number);
            if (parts[0] === 10) return true;
            if (parts[0] === 172 && parts[1] >= 16 && parts[1] <= 31) return true;
            if (parts[0] === 192 && parts[1] === 168) return true;
            if (parts[0] === 127) return 'Loopback';
            return false;
        }

        function calculateSubnet() {
            const ipInput = document.getElementById('ipAddress').value.trim();
            const cidr = parseInt(document.getElementById('cidrBits').value);

            // Validate IP
            const ipRegex = /^(\d{1,3}\.){3}\d{1,3}$/;
            if (!ipRegex.test(ipInput)) {
                alert('Invalid IP address format. Please use format: 192.168.1.0');
                return;
            }

            const parts = ipInput.split('.').map(Number);
            if (parts.some(p => p < 0 || p > 255)) {
                alert('IP address octets must be between 0 and 255');
                return;
            }

            // Calculate subnet mask
            const subnetMask = cidrToSubnetMask(cidr);
            const maskLong = ipToLong(subnetMask);
            const ipLong = ipToLong(ipInput);

            // Calculate network address
            const networkLong = ipLong & maskLong;
            const networkAddress = longToIp(networkLong);

            // Calculate broadcast address
            const hostBits = 32 - cidr;
            const broadcastLong = networkLong | ((1 << hostBits) - 1);
            const broadcastAddress = longToIp(broadcastLong);

            // Calculate host range
            const firstHostLong = networkLong + 1;
            const lastHostLong = broadcastLong - 1;
            const firstHost = longToIp(firstHostLong);
            const lastHost = longToIp(lastHostLong);

            // Calculate number of hosts
            const totalHosts = Math.pow(2, hostBits);
            const usableHosts = cidr === 32 ? 1 : (cidr === 31 ? 2 : totalHosts - 2);

            // Wildcard mask
            const wildcardParts = subnetMask.split('.').map(octet => 255 - parseInt(octet));
            const wildcardMask = wildcardParts.join('.');

            // IP Class and Type
            const firstOctet = parts[0];
            const ipClass = getIPClass(firstOctet);
            const privateCheck = isPrivateIP(ipInput);
            const ipType = privateCheck === true ? 'Private' : (privateCheck === 'Loopback' ? 'Loopback' : 'Public');

            // Display results
            displayResults({
                ipAddress: ipInput,
                cidr: cidr,
                subnetMask: subnetMask,
                networkAddress: networkAddress,
                broadcastAddress: broadcastAddress,
                firstHost: firstHost,
                lastHost: lastHost,
                totalHosts: totalHosts,
                usableHosts: usableHosts,
                wildcardMask: wildcardMask,
                ipClass: ipClass,
                ipType: ipType
            });
        }

        function calculateIPv6Subnet() {
            const ipv6Input = document.getElementById('ipv6Address').value.trim();
            const prefix = parseInt(document.getElementById('ipv6Prefix').value);

            try {
                // Expand IPv6 address
                const fullAddress = expandIPv6(ipv6Input);
                
                // Calculate network prefix
                const networkPrefix = calculateIPv6Network(fullAddress, prefix);
                
                // Calculate total addresses
                const hostBits = 128 - prefix;
                let totalAddresses;
                if (hostBits <= 53) {
                    totalAddresses = `2^${hostBits} = ${Math.pow(2, hostBits).toLocaleString()}`;
                } else {
                    totalAddresses = `2^${hostBits} (very large)`;
                }

                // Determine address type
                const addressType = getIPv6Type(fullAddress);

                // Display IPv6 results
                displayIPv6Results({
                    ipAddress: ipv6Input,
                    fullAddress: fullAddress,
                    prefix: prefix,
                    networkPrefix: networkPrefix,
                    totalAddresses: totalAddresses,
                    addressType: addressType,
                    hostBits: hostBits
                });
            } catch (error) {
                alert('Invalid IPv6 address: ' + error.message);
            }
        }

        function expandIPv6(ip) {
            // Remove leading zeros and expand ::
            if (ip.includes('::')) {
                const parts = ip.split('::');
                const left = parts[0] ? parts[0].split(':') : [];
                const right = parts[1] ? parts[1].split(':') : [];
                const missing = 8 - left.length - right.length;
                const middle = Array(missing).fill('0000');
                const full = [...left, ...middle, ...right];
                return full.map(p => p.padStart(4, '0')).join(':');
            }
            return ip.split(':').map(p => p.padStart(4, '0')).join(':');
        }

        function calculateIPv6Network(fullAddress, prefix) {
            const parts = fullAddress.split(':');
            const bits = parts.map(p => parseInt(p, 16).toString(2).padStart(16, '0')).join('');
            const networkBits = bits.substring(0, prefix) + '0'.repeat(128 - prefix);
            
            const networkParts = [];
            for (let i = 0; i < 8; i++) {
                const part = networkBits.substring(i * 16, (i + 1) * 16);
                networkParts.push(parseInt(part, 2).toString(16).padStart(4, '0'));
            }
            
            return networkParts.join(':') + '/' + prefix;
        }

        function getIPv6Type(address) {
            const first = address.substring(0, 4);
            
            if (address === '0000:0000:0000:0000:0000:0000:0000:0001') return 'Loopback (::1)';
            if (address === '0000:0000:0000:0000:0000:0000:0000:0000') return 'Unspecified (::)';
            if (first.startsWith('fe80')) return 'Link-Local';
            if (first.startsWith('ff')) return 'Multicast';
            if (first.startsWith('fc') || first.startsWith('fd')) return 'Unique Local (Private)';
            if (first.startsWith('2') || first.startsWith('3')) return 'Global Unicast (Public)';
            
            return 'Reserved';
        }

        function displayIPv6Results(data) {
            const resultGrid = document.getElementById('resultGrid');
            resultGrid.innerHTML = `
                <div class="result-box">
                    <div class="result-label">Prefix Length</div>
                    <div class="result-value">/${data.prefix}</div>
                </div>
                <div class="result-box">
                    <div class="result-label">Host Bits</div>
                    <div class="result-value">${data.hostBits}</div>
                </div>
                <div class="result-box">
                    <div class="result-label">Total Addresses</div>
                    <div class="result-value" style="font-size: 0.9em;">${data.totalAddresses}</div>
                </div>
            `;

            const detailSection = document.getElementById('detailSection');
            detailSection.innerHTML = `
                <h3>📊 IPv6 Network Details</h3>
                <div class="detail-row">
                    <span class="detail-label">IPv6 Address (Input)</span>
                    <span class="detail-value">${data.ipAddress}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Full IPv6 Address</span>
                    <span class="detail-value">${data.fullAddress}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Network Prefix</span>
                    <span class="detail-value">${data.networkPrefix}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Prefix Length</span>
                    <span class="detail-value">/${data.prefix}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Address Type</span>
                    <span class="detail-value">${data.addressType}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Total Addresses</span>
                    <span class="detail-value">${data.totalAddresses}</span>
                </div>
            `;

            document.getElementById('binarySection').style.display = 'none';
            
            const infoBox = document.getElementById('infoBox');
            infoBox.innerHTML = `
                <h4>📚 IPv6 Address Types:</h4>
                <table class="cidr-table">
                    <tr>
                        <th>Type</th>
                        <th>Prefix</th>
                        <th>Description</th>
                    </tr>
                    <tr><td>Loopback</td><td>::1/128</td><td>Localhost</td></tr>
                    <tr><td>Link-Local</td><td>fe80::/10</td><td>Single network segment</td></tr>
                    <tr><td>Unique Local</td><td>fc00::/7</td><td>Private networks</td></tr>
                    <tr><td>Global Unicast</td><td>2000::/3</td><td>Public internet</td></tr>
                    <tr><td>Multicast</td><td>ff00::/8</td><td>Multicast addresses</td></tr>
                </table>
            `;

            document.getElementById('results').classList.add('active');
            document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function displayResults(data) {
            // Update summary boxes
            const resultGrid = document.getElementById('resultGrid');
            resultGrid.innerHTML = `
                <div class="result-box">
                    <div class="result-label">CIDR Notation</div>
                    <div class="result-value">/${data.cidr}</div>
                </div>
                <div class="result-box">
                    <div class="result-label">Total Hosts</div>
                    <div class="result-value">${formatNumber(data.totalHosts)}</div>
                </div>
                <div class="result-box">
                    <div class="result-label">Usable Hosts</div>
                    <div class="result-value">${formatNumber(data.usableHosts)}</div>
                </div>
            `;

            // Update details
            const detailSection = document.getElementById('detailSection');
            detailSection.innerHTML = `
                <h3>📊 Network Details</h3>
                <div class="detail-row">
                    <span class="detail-label">IP Address</span>
                    <span class="detail-value">${data.ipAddress}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Network Address</span>
                    <span class="detail-value">${data.networkAddress}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Broadcast Address</span>
                    <span class="detail-value">${data.broadcastAddress}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">First Usable IP</span>
                    <span class="detail-value">${data.firstHost}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Last Usable IP</span>
                    <span class="detail-value">${data.lastHost}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Subnet Mask</span>
                    <span class="detail-value">${data.subnetMask}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Wildcard Mask</span>
                    <span class="detail-value">${data.wildcardMask}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">IP Class</span>
                    <span class="detail-value">${data.ipClass}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">IP Type</span>
                    <span class="detail-value">${data.ipType}</span>
                </div>
            `;

            // Update binary representations
            const binarySection = document.getElementById('binarySection');
            binarySection.style.display = 'block';
            binarySection.innerHTML = `
                <h3>🔢 Binary Representation</h3>
                <div class="binary-section">
                    <div class="binary-label">IP Address (Binary):</div>
                    <div class="binary-value">${ipToBinary(data.ipAddress)}</div>
                </div>
                <div class="binary-section">
                    <div class="binary-label">Subnet Mask (Binary):</div>
                    <div class="binary-value">${ipToBinary(data.subnetMask)}</div>
                </div>
                <div class="binary-section">
                    <div class="binary-label">Network Address (Binary):</div>
                    <div class="binary-value">${ipToBinary(data.networkAddress)}</div>
                </div>
            `;

            const infoBox = document.getElementById('infoBox');
            infoBox.innerHTML = `
                <h4>📚 Quick Reference - Common CIDR Notations:</h4>
                <table class="cidr-table">
                    <tr>
                        <th>CIDR</th>
                        <th>Subnet Mask</th>
                        <th>Usable Hosts</th>
                    </tr>
                    <tr><td>/8</td><td>255.0.0.0</td><td>16,777,214</td></tr>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debt Health & EMI Recovery Planner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #f6f9fc; font-family: 'Segoe UI', sans-serif; }
    .card { border-radius: 16px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .btn { border-radius: 10px; }
    h4 { color: #0a3d62; }
    #summary p { margin: 0; font-size: 15px; }
    table input { width: 100%; border: none; background: #f8f9fa; padding: 4px; border-radius: 6px; }
  </style>
</head>
<body class="p-3">
  <div class="container">
    <h3 class="text-center mb-4">💸 Debt Health Analyzer & EMI Recovery Planner</h3>

    <div class="card p-3 mb-4">
      <div class="row">
        <div class="col-md-4">
          <label>Monthly Income (₹)</label>
          <input id="income" type="number" class="form-control" placeholder="150000">
        </div>
        <div class="col-md-4">
          <label>Cash Reserve (₹)</label>
          <input id="reserve" type="number" class="form-control" placeholder="900000">
        </div>
        <div class="col-md-4 d-flex align-items-end">
          <button class="btn btn-primary w-100" onclick="analyzeDebt()">Analyze</button>
        </div>
      </div>
    </div>

    <div class="card p-3 mb-4">
      <h4>Loans</h4>
      <table class="table table-bordered text-center align-middle">
        <thead class="table-light">
          <tr>
            <th>Loan Name</th>
            <th>Balance (₹)</th>
            <th>Interest (%)</th>
            <th>EMI (₹)</th>
            <th>Tenure (mo)</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="loanTable">
          <tr>
            <td><input value="Axis PL"></td>
            <td><input value="900000" type="number"></td>
            <td><input value="14" type="number"></td>
            <td><input value="65002" type="number"></td>
            <td><input value="24" type="number"></td>
            <td><button class="btn btn-sm btn-danger" onclick="removeRow(this)">🗑️</button></td>
          </tr>
        </tbody>
      </table>
      <button class="btn btn-success" onclick="addRow()">➕ Add Loan</button>
    </div>

    <div id="summary" class="card p-3 mb-4"></div>
    <canvas id="chart" height="120"></canvas>
  </div>

  <script>
    function addRow() {
      const row = `
        <tr>
          <td><input placeholder="Loan Name"></td>
          <td><input type="number" placeholder="0"></td>
          <td><input type="number" placeholder="0"></td>
          <td><input type="number" placeholder="0"></td>
          <td><input type="number" placeholder="0"></td>
          <td><button class='btn btn-sm btn-danger' onclick='removeRow(this)'>🗑️</button></td>
        </tr>`;
      document.getElementById('loanTable').insertAdjacentHTML('beforeend', row);
    }

    function removeRow(btn) {
      btn.parentElement.parentElement.remove();
    }

    function analyzeDebt() {
      const income = parseFloat(document.getElementById('income').value) || 0;
      const reserve = parseFloat(document.getElementById('reserve').value) || 0;

      const rows = document.querySelectorAll('#loanTable tr');
      const loans = [];

      rows.forEach(r => {
        const cells = r.querySelectorAll('input');
        loans.push({
          name: cells[0].value,
          balance: parseFloat(cells[1].value) || 0,
          rate: parseFloat(cells[2].value) || 0,
          emi: parseFloat(cells[3].value) || 0,
          tenure: parseFloat(cells[4].value) || 0
        });
      });

      const totalEmi = loans.reduce((sum, l) => sum + l.emi, 0);
      const totalBalance = loans.reduce((sum, l) => sum + l.balance, 0);
      const coverageRatio = income / totalEmi;

      let coverageStatus = '';
      let recoveryAdvice = '';

      if (coverageRatio < 0.75) {
        coverageStatus = 'Severe Stress';
        recoveryAdvice = 'You are in a debt spiral. All freed EMI must go to prepayments until EMI < income.';
      } else if (coverageRatio < 1.0) {
        coverageStatus = 'Negative Cashflow Zone';
        recoveryAdvice = 'You’re close to stability — continue using freed EMI for debt prepayment.';
      } else if (coverageRatio < 1.25) {
        coverageStatus = 'Recovery Phase';
        recoveryAdvice = 'You can start reserving a small portion for emergency fund.';
      } else if (coverageRatio < 2.0) {
        coverageStatus = 'Stable';
        recoveryAdvice = 'Healthy balance — maintain this ratio by avoiding new loans.';
      } else {
        coverageStatus = 'Healthy';
        recoveryAdvice = 'Excellent financial health.';
      }

      // Suggest priority loan (snowball: smallest balance first)
      const snowballTarget = [...loans].sort((a, b) => a.balance - b.balance)[0];
      const suggestion = `🎯 Close "${snowballTarget.name}" first to free ₹${snowballTarget.emi.toLocaleString()} EMI.`;

      // Display summary
      document.getElementById('summary').innerHTML = `
        <p><b>Total Outstanding:</b> ₹${totalBalance.toLocaleString()}</p>
        <p><b>Total EMI:</b> ₹${totalEmi.toLocaleString()}</p>
        <p><b>Monthly Income:</b> ₹${income.toLocaleString()}</p>
        <p><b>EMI Coverage Ratio:</b> ${coverageRatio.toFixed(2)} (${coverageStatus})</p>
        <p><b>Advice:</b> ${recoveryAdvice}</p>
        <p><b>Next Step:</b> ${suggestion}</p>
      `;

      // Chart: EMI Coverage Ratio
      const ctx = document.getElementById('chart').getContext('2d');
      if (window.coverChart) window.coverChart.destroy();
      window.coverChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Coverage Ratio'],
          datasets: [{
            label: 'EMI Coverage',
            data: [coverageRatio],
            backgroundColor: coverageRatio < 1 ? 'rgba(255,99,132,0.8)' : 'rgba(75,192,192,0.8)'
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            y: {
              min: 0,
              max: 2,
              ticks: { stepSize: 0.25 }
            }
          }
        }
      });
    }
  </script>
</body>
</html>

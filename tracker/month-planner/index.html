<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Account Planner | destiny-tracer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }

        .month-selector {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .month-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .month-nav button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .month-nav button:hover {
            background: #5568d3;
        }

        .month-display {
            flex: 1;
            text-align: center;
            font-size: 1.5em;
            font-weight: 700;
            color: #667eea;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #667eea;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .transaction-row {
            display: grid;
            grid-template-columns: 120px 1fr 1fr 100px 120px 40px;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }

        .transaction-row select,
        .transaction-row input {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.95em;
            transition: all 0.3s;
        }

        .transaction-row select:focus,
        .transaction-row input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .remove-btn {
            padding: 8px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .remove-btn:hover {
            background: #c0392b;
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            background: #f0f0f0;
            color: #667eea;
            border: 2px dashed #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .add-btn:hover {
            background: #e9ecef;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .results {
            display: none;
        }

        .results.active {
            display: block;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .summary-box {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .summary-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .summary-value {
            font-size: 1.5em;
            font-weight: 700;
            color: #333;
        }

        .summary-value.positive {
            color: #10b981;
        }

        .summary-value.negative {
            color: #e74c3c;
        }

        .account-summary {
            margin-top: 20px;
        }

        .account-item {
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .account-name {
            font-size: 1.2em;
            font-weight: 700;
            color: #667eea;
        }

        .account-total {
            font-size: 1.3em;
            font-weight: 700;
        }

        .transaction-list {
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
        }

        .transaction-item {
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .calendar-day {
            aspect-ratio: 1;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .calendar-day:hover {
            background: #e9ecef;
            transform: scale(1.05);
            z-index: 10;
        }

        .calendar-day.has-transaction {
            background: #667eea;
            color: white;
        }

        .calendar-day-number {
            font-weight: 700;
            font-size: 1.1em;
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 3px;
        }

        .calendar-day-amount {
            font-size: 0.75em;
            font-weight: 600;
            margin-top: 3px;
        }

        .calendar-day-accounts {
            font-size: 0.65em;
            margin-top: 5px;
            line-height: 1.3;
        }

        .account-line {
            margin: 2px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .calendar-header {
            font-weight: 700;
            color: #667eea;
            padding: 10px;
            text-align: center;
        }

        .snapshot {
            background: white;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            font-size: 0.9em;
        }

        .print-calendar {
            background: white;
            padding: 30px;
            display: none;
        }

        .print-calendar.printing {
            display: block;
        }

        @media print {
            body * {
                visibility: hidden;
            }
            
            .print-calendar,
            .print-calendar * {
                visibility: visible;
            }
            
            .print-calendar {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }

            .calendar-day {
                border: 1px solid #333 !important;
                page-break-inside: avoid;
            }
        }

        @media (max-width: 768px) {
            .transaction-row {
                grid-template-columns: 1fr;
            }

            .calendar {
                grid-template-columns: repeat(7, 1fr);
                gap: 5px;
            }

            .calendar-day {
                padding: 5px;
            }

            .calendar-day-number {
                font-size: 0.9em;
            }

            .calendar-day-amount {
                font-size: 0.7em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../../index.html" class="back-link">← Back to Home</a>
        
        <header>
            <h1>📅 Monthly Account Planner</h1>
            <p>Track income & expenses across multiple accounts</p>
        </header>

        <div class="month-selector">
            <div class="month-nav">
                <button onclick="changeMonth(-1)">← Previous</button>
                <div class="month-display" id="monthDisplay">November 2025</div>
                <button onclick="changeMonth(1)">Next →</button>
            </div>
        </div>

        <div class="card">
            <h2>Transactions</h2>
            
            <div style="display: grid; grid-template-columns: 120px 1fr 1fr 100px 120px 40px; gap: 10px; margin-bottom: 15px; font-weight: 600; color: #666; font-size: 0.9em;">
                <div>Date</div>
                <div>Description</div>
                <div>Account</div>
                <div>Type</div>
                <div>Amount (₹)</div>
                <div></div>
            </div>

            <div id="transactionsList"></div>

            <button class="add-btn" onclick="addTransaction()">+ Add Transaction</button>

            <div class="action-buttons">
                <button class="btn btn-primary" onclick="saveAndCalculate()">💾 Save & Calculate</button>
                <button class="btn btn-secondary" onclick="clearMonth()">🗑️ Clear Month</button>
            </div>
        </div>

        <div class="results" id="results">
            <div class="card">
                <h2>Monthly Summary</h2>
                <div class="summary-grid">
                    <div class="summary-box">
                        <div class="summary-label">Total Income</div>
                        <div class="summary-value positive" id="totalIncome">₹0</div>
                    </div>
                    <div class="summary-box">
                        <div class="summary-label">Total Expense</div>
                        <div class="summary-value negative" id="totalExpense">₹0</div>
                    </div>
                    <div class="summary-box">
                        <div class="summary-label">Net Balance</div>
                        <div class="summary-value" id="netBalance">₹0</div>
                    </div>
                </div>

                <h3 style="color: #667eea; margin-top: 30px; margin-bottom: 15px;">Account-wise Summary</h3>
                <div id="accountSummary"></div>
            </div>

            <div class="card">
                <h2>📆 Calendar View</h2>
                <div style="text-align: right; margin-bottom: 15px;">
                    <button class="btn btn-primary" onclick="printCalendar()" style="flex: none; padding: 10px 20px;">
                        🖨️ Print Calendar
                    </button>
                </div>
                <div class="calendar" id="calendar"></div>
            </div>

            <div class="print-calendar" id="printCalendar">
                <h1 style="text-align: center; margin-bottom: 20px;" id="printTitle"></h1>
                <div class="calendar" id="printCalendarGrid"></div>
            </div>

            <div class="card">
                <h2>📋 Daily Snapshot</h2>
                <div class="snapshot" id="snapshot"></div>
                
                <div class="action-buttons" style="margin-top: 20px;">
                    <button class="btn btn-primary" onclick="exportPDF()">📄 Export PDF</button>
                    <button class="btn btn-primary" onclick="exportCSV()">📊 Export CSV</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let transactionCounter = 0;

        function initApp() {
            updateMonthDisplay();
            loadTransactions();
            addTransaction();
        }

        function updateMonthDisplay() {
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 
                          'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('monthDisplay').textContent = `${months[currentMonth]} ${currentYear}`;
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            updateMonthDisplay();
            loadTransactions();
        }

        function getDaysInMonth() {
            return new Date(currentYear, currentMonth + 1, 0).getDate();
        }

        function getMonthKey() {
            return `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
        }

        function addTransaction() {
            transactionCounter++;
            const daysInMonth = getDaysInMonth();
            const transactionsList = document.getElementById('transactionsList');
            
            const row = document.createElement('div');
            row.className = 'transaction-row';
            row.setAttribute('data-transaction-id', transactionCounter);
            
            let dateOptions = '';
            for (let i = 1; i <= daysInMonth; i++) {
                dateOptions += `<option value="${i}">${i}</option>`;
            }
            
            row.innerHTML = `
                <select class="transaction-date">
                    ${dateOptions}
                </select>
                <input type="text" class="transaction-description" placeholder="Description">
                <input type="text" class="transaction-account" placeholder="Account name">
                <select class="transaction-type">
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
                <input type="number" class="transaction-amount" placeholder="0" value="0">
                <button class="remove-btn" onclick="removeTransaction(${transactionCounter})">×</button>
            `;
            
            transactionsList.appendChild(row);
        }

        function removeTransaction(id) {
            const row = document.querySelector(`[data-transaction-id="${id}"]`);
            if (row) {
                row.remove();
            }
        }

        function saveAndCalculate() {
            const transactions = [];
            document.querySelectorAll('.transaction-row').forEach(row => {
                const date = row.querySelector('.transaction-date').value;
                const description = row.querySelector('.transaction-description').value.trim();
                const account = row.querySelector('.transaction-account').value.trim();
                const type = row.querySelector('.transaction-type').value;
                const amount = parseFloat(row.querySelector('.transaction-amount').value) || 0;
                
                if (description && account && amount > 0) {
                    transactions.push({ date, description, account, type, amount });
                }
            });

            // Save to localStorage
            const monthKey = getMonthKey();
            localStorage.setItem(monthKey, JSON.stringify(transactions));

            // Calculate and display
            calculateSummary(transactions);
            generateCalendar(transactions);
            generateSnapshot(transactions);
            
            document.getElementById('results').classList.add('active');
            document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function loadTransactions() {
            const monthKey = getMonthKey();
            const saved = localStorage.getItem(monthKey);
            
            document.getElementById('transactionsList').innerHTML = '';
            document.getElementById('results').classList.remove('active');
            
            if (saved) {
                const transactions = JSON.parse(saved);
                transactions.forEach(t => {
                    addTransaction();
                    const rows = document.querySelectorAll('.transaction-row');
                    const lastRow = rows[rows.length - 1];
                    lastRow.querySelector('.transaction-date').value = t.date;
                    lastRow.querySelector('.transaction-description').value = t.description;
                    lastRow.querySelector('.transaction-account').value = t.account;
                    lastRow.querySelector('.transaction-type').value = t.type;
                    lastRow.querySelector('.transaction-amount').value = t.amount;
                });
            }
            
            if (document.querySelectorAll('.transaction-row').length === 0) {
                addTransaction();
            }
        }

        function calculateSummary(transactions) {
            let totalIncome = 0;
            let totalExpense = 0;
            const accountData = {};

            transactions.forEach(t => {
                const amount = t.type === 'income' ? t.amount : -t.amount;
                
                if (t.type === 'income') {
                    totalIncome += t.amount;
                } else {
                    totalExpense += t.amount;
                }

                if (!accountData[t.account]) {
                    accountData[t.account] = {
                        total: 0,
                        transactions: []
                    };
                }
                accountData[t.account].total += amount;
                accountData[t.account].transactions.push(t);
            });

            const netBalance = totalIncome - totalExpense;

            document.getElementById('totalIncome').textContent = `₹${formatNumber(totalIncome)}`;
            document.getElementById('totalExpense').textContent = `₹${formatNumber(totalExpense)}`;
            
            const netElement = document.getElementById('netBalance');
            netElement.textContent = `₹${formatNumber(netBalance)}`;
            netElement.className = 'summary-value ' + (netBalance >= 0 ? 'positive' : 'negative');

            // Display account summary
            const accountSummary = document.getElementById('accountSummary');
            accountSummary.innerHTML = '';

            Object.keys(accountData).sort().forEach(account => {
                const data = accountData[account];
                const accountDiv = document.createElement('div');
                accountDiv.className = 'account-item';
                
                let transactionListHTML = '<div class="transaction-list">';
                data.transactions.forEach(t => {
                    const sign = t.type === 'income' ? '+' : '-';
                    transactionListHTML += `
                        <div class="transaction-item">
                            ${t.date}th: ${t.description} - ${sign}₹${formatNumber(t.amount)}
                        </div>
                    `;
                });
                transactionListHTML += '</div>';

                accountDiv.innerHTML = `
                    <div class="account-header">
                        <div class="account-name">${account}</div>
                        <div class="account-total" style="color: ${data.total >= 0 ? '#10b981' : '#e74c3c'}">
                            ₹${formatNumber(data.total)}
                        </div>
                    </div>
                    ${transactionListHTML}
                `;
                
                accountSummary.appendChild(accountDiv);
            });
        }

        function generateCalendar(transactions) {
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';

            // Add day headers
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            days.forEach(day => {
                const header = document.createElement('div');
                header.className = 'calendar-header';
                header.textContent = day;
                calendar.appendChild(header);
            });

            // Group transactions by date and account
            const dateData = {};
            transactions.forEach(t => {
                if (!dateData[t.date]) {
                    dateData[t.date] = {
                        accounts: {},
                        total: 0
                    };
                }
                
                if (!dateData[t.date].accounts[t.account]) {
                    dateData[t.date].accounts[t.account] = 0;
                }
                
                const amount = t.type === 'income' ? t.amount : -t.amount;
                dateData[t.date].accounts[t.account] += amount;
                dateData[t.date].total += amount;
            });

            // Get first day of month
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = getDaysInMonth();

            // Add empty cells for days before month starts
            for (let i = 0; i < firstDay; i++) {
                const emptyDay = document.createElement('div');
                calendar.appendChild(emptyDay);
            }

            // Add days
            for (let day = 1; day <= daysInMonth; day++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'calendar-day';
                
                const dayNumber = document.createElement('div');
                dayNumber.className = 'calendar-day-number';
                dayNumber.textContent = day;
                dayDiv.appendChild(dayNumber);

                if (dateData[day]) {
                    dayDiv.classList.add('has-transaction');
                    
                    // Add account-wise breakdown
                    const accountsDiv = document.createElement('div');
                    accountsDiv.className = 'calendar-day-accounts';
                    
                    Object.keys(dateData[day].accounts).sort().forEach(account => {
                        const accountAmount = dateData[day].accounts[account];
                        const accountLine = document.createElement('div');
                        accountLine.className = 'account-line';
                        accountLine.textContent = `${account}: ${accountAmount >= 0 ? '+' : ''}₹${formatNumber(Math.abs(accountAmount))}`;
                        accountsDiv.appendChild(accountLine);
                    });
                    
                    dayDiv.appendChild(accountsDiv);
                    
                    // Add total at bottom
                    const total = dateData[day].total;
                    const totalDiv = document.createElement('div');
                    totalDiv.className = 'calendar-day-amount';
                    totalDiv.style.marginTop = '5px';
                    totalDiv.style.paddingTop = '5px';
                    totalDiv.style.borderTop = '1px solid rgba(255,255,255,0.3)';
                    totalDiv.innerHTML = `<strong>Total: ${total >= 0 ? '+' : ''}₹${formatNumber(Math.abs(total))}</strong>`;
                    dayDiv.appendChild(totalDiv);
                    
                    // Tooltip with full details
                    let tooltipText = `Date: ${day}\n\n`;
                    Object.keys(dateData[day].accounts).forEach(account => {
                        const amount = dateData[day].accounts[account];
                        tooltipText += `${account}: ${amount >= 0 ? '+' : ''}₹${formatNumber(Math.abs(amount))}\n`;
                    });
                    tooltipText += `\nTotal: ${total >= 0 ? '+' : ''}₹${formatNumber(Math.abs(total))}`;
                    dayDiv.title = tooltipText;
                }

                calendar.appendChild(dayDiv);
            }
        }

        function generateSnapshot(transactions) {
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 
                          'July', 'August', 'September', 'October', 'November', 'December'];
            
            let snapshot = `${months[currentMonth]} ${currentYear} - Account Schedule\n`;
            snapshot += '='.repeat(80) + '\n\n';

            // Group by date
            const dateData = {};
            transactions.forEach(t => {
                if (!dateData[t.date]) {
                    dateData[t.date] = [];
                }
                dateData[t.date].push(t);
            });

            // Sort dates
            Object.keys(dateData).sort((a, b) => parseInt(a) - parseInt(b)).forEach(date => {
                snapshot += `Date: ${date}${getDateSuffix(parseInt(date))} ${months[currentMonth]}\n`;
                
                let dayTotal = 0;
                dateData[date].forEach(t => {
                    const sign = t.type === 'income' ? '+' : '-';
                    const amount = t.type === 'income' ? t.amount : -t.amount;
                    dayTotal += amount;
                    snapshot += `  - ${t.account}: ${sign}₹${formatNumber(t.amount)} (${t.description} - ${t.type})\n`;
                });
                
                snapshot += `  Total for day: ${dayTotal >= 0 ? '+' : ''}₹${formatNumber(dayTotal)}\n\n`;
            });

            snapshot += '='.repeat(80) + '\n';
            snapshot += 'Account Summary:\n';
            snapshot += '='.repeat(80) + '\n';

            const accountData = {};
            transactions.forEach(t => {
                if (!accountData[t.account]) {
                    accountData[t.account] = 0;
                }
                accountData[t.account] += t.type === 'income' ? t.amount : -t.amount;
            });

            Object.keys(accountData).sort().forEach(account => {
                snapshot += `  ${account}: Net ₹${formatNumber(accountData[account])}\n`;
            });

            document.getElementById('snapshot').textContent = snapshot;
        }

        function getDateSuffix(day) {
            if (day >= 11 && day <= 13) return 'th';
            switch (day % 10) {
                case 1: return 'st';
                case 2: return 'nd';
                case 3: return 'rd';
                default: return 'th';
            }
        }

        function clearMonth() {
            if (confirm('Are you sure you want to clear all transactions for this month?')) {
                const monthKey = getMonthKey();
                localStorage.removeItem(monthKey);
                loadTransactions();
                document.getElementById('results').classList.remove('active');
            }
        }

        function exportPDF() {
            const snapshot = document.getElementById('snapshot').textContent;
            const monthKey = getMonthKey();
            
            const blob = new Blob([snapshot], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `account-planner-${monthKey}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('PDF exported successfully!');
        }

        function exportCSV() {
            const monthKey = getMonthKey();
            const saved = localStorage.getItem(monthKey);
            
            if (!saved) {
                alert('No data to export');
                return;
            }

            const transactions = JSON.parse(saved);
            
            let csv = 'Date,Description,Account,Type,Amount\n';
            transactions.forEach(t => {
                csv += `${t.date},"${t.description}","${t.account}",${t.type},${t.amount}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `account-planner-${monthKey}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('CSV exported successfully!');
        }

        function formatNumber(num) {
            return Math.abs(Math.round(num)).toLocaleString('en-IN');
        }

        function printCalendar() {
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 
                          'July', 'August', 'September', 'October', 'November', 'December'];
            
            // Set print title
            document.getElementById('printTitle').textContent = `${months[currentMonth]} ${currentYear} - Account Calendar`;
            
            // Clone calendar to print area
            const originalCalendar = document.getElementById('calendar');
            const printCalendarGrid = document.getElementById('printCalendarGrid');
            printCalendarGrid.innerHTML = originalCalendar.innerHTML;
            
            // Show print calendar
            document.getElementById('printCalendar').classList.add('printing');
            
            // Trigger print
            setTimeout(() => {
                window.print();
                // Hide print calendar after printing
                setTimeout(() => {
                    document.getElementById('printCalendar').classList.remove('printing');
                }, 100);
            }, 100);
        }

        // Initialize app
        initApp();
    </script>
